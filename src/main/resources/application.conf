akka.javasdk {
  agent {
    # Default model for all agents in this service. Other providers can be
    # configured, see https://doc.akka.io/sdk/model-provider-details.html
    model-provider = googleai-gemini

    googleai-gemini {
      model-name = "gemini-2.5-flash"
      # API key supplied via environment variable; no secrets in source.
      api-key = ${?GOOGLE_AI_GEMINI_API_KEY}
    }
  }
}
