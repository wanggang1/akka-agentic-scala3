# Akka component descriptor — hand-maintained.
#
# The Akka SDK normally generates this at compile time via a javac annotation
# processor (akka-javasdk-annotation-processor). That processor only sees JAVA
# sources, but our components are written in Scala, so it never discovers them.
# We therefore declare them here by hand. ComponentLocator globs
# META-INF/akka-javasdk-components_*.conf and reads each component type as a list
# of fully-qualified class names.
#
# ⚠️ Add every new Scala component here (by type) when you create it.
akka.javasdk.components {
  # cap-1 (Scala) + cap-2 (Java, com.gwgs.akkaagentic.team.*). The team components are Java but
  # are still listed by hand: the annotation processor is disabled (-proc:none) so it can't
  # regenerate-and-overwrite this file. See specs/004 research R2.
  agent = [
    "com.gwgs.akkaagentic.application.GreetingAgent",
    "com.gwgs.akkaagentic.team.application.ToneAgent",
    "com.gwgs.akkaagentic.team.application.GreetingComposerAgent"
  ]
  http-endpoint = [
    "com.gwgs.akkaagentic.api.GreetingEndpoint",
    "com.gwgs.akkaagentic.api.HealthEndpoint",
    "com.gwgs.akkaagentic.team.api.GreetingTeamEndpoint",
    "com.gwgs.akkaagentic.assistant.api.HelpDeskEndpoint"
  ]
  workflow = ["com.gwgs.akkaagentic.team.application.GreetingWorkflow"]
  # cap-3 (Scala) — Autonomous Agent. Distinct `autonomous-agent` key (confirmed from the annotation
  # processor's constant pool), not the plain `agent` key. See specs/005 research R2.
  autonomous-agent = ["com.gwgs.akkaagentic.assistant.application.HelpDeskAgent"]
}

# The @Setup ServiceSetup class is NOT a component: the SDK's ComponentLocator reads it from
# a separate top-level path `akka.javasdk.service-setup` (sibling of `akka.javasdk.components`)
# as a SINGLE fully-qualified class name — not a list. Confirmed from the SDK bytecode
# (ComponentLocator: getString on `akka.javasdk.service-setup`). Both the runtime and the
# TestKit locate it here, so Bootstrap.onStartup runs in tests too.
akka.javasdk.service-setup = "com.gwgs.akkaagentic.application.Bootstrap"
